<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
     <header class="header-flex">
            <a href="index.html">
                <img src="img/logo-1.png" alt="BiblioSaber" id="logo">
            </a>
            <h1>Catálogo de Libros</h1>
    </header>
    <div id="container">
        <button id="btnAgregar">Agregar un Libro</button>
        <!-- FORM -->
        <section id="form-section" class="hidden">
            <h2>Crear / Editar</h2>
            <form id="formLibro">
                <input type="hidden" id="id">
                <input type="text" id="titulo" placeholder="Título" required>
                <input type="text" id="autor" placeholder="Autor" required>
                <input type="number" id="anio" placeholder="Año" required>
                <div id="btns">
                    <button type="submit">Guardar</button>
                     <button type="button" id="btnCerrar">Cerrar</button>
                </div>
            </form>
        </section>

        <!-- TABLA -->
        <section id="catalogoSection">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Año</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaLibros"></tbody>
            </table>
        </section>
    </div>

    <footer>
        <p>&copy; Proyecto con fines educativos para curso FullStack sence 2026</p>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
